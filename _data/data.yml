projects:
    title: Projects
    assignments:
      - title: Twitter Sentiment Analysis (BiSense Emoji Embedding)
        link: "https://arxiv.org/abs/1807.07961"
        details: | 
            - Implemented binary classification of text+emoji tweets having bisense/sarcastic meaning
            - Used variety of Machine Learning Algorithms like Naive Bayes, SVM, Decision Tree, Adaboost, MLP for getting initial accuracy and
              Feature vector generation using word2vec and emoji2vec as part of preprocessing
            - Used Kaggle Tweets Dataset and Scraped Tweets with emojis as final dataset with total 1,93,000 tweets having text+emoji
            - Used Python Libraries like sklearn, scipy, matplotlib, keras, tensorflow, pickle, tweepy, nltk, word2vec, emoji2vec, h5py
            - Final Accuracy was 86% for 4-layer DNN and 83% for SVM. Demonstrated results using confusion matrix alongwith Accuracy, F1-Score,
              Precision and Recall

